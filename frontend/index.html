<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BISINDO Recognition - Local</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app {
            display: flex;
            flex-direction: row;
            padding: 20px;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            align-items: flex-start;
        }

        .camera-box {
            flex: 2;
            background: #000;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            aspect-ratio: 4 / 3;
        }

        video,
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
        }

        .panel {
            flex: 1;
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            min-width: 320px;
            min-height: 480px;
        }

        #prediction {
            font-size: 7rem;
            font-weight: 800;
            color: #2c3e50;
            margin: 20px 0;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fcfcfd;
            width: 100%;
            border-radius: 10px;
            border: 1px dashed #eee;
        }

        .controls {
            width: 100%;
            display: grid;
            gap: 12px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            color: white;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #startBtn {
            background: #27ae60;
        }

        #startBtn:hover {
            background: #2ecc71;
        }

        #stopBtn {
            background: #e67e22;
        }

        #stopBtn:hover {
            background: #f39c12;
        }

        #exitBtn {
            background: #c0392b;
        }

        #exitBtn:hover {
            background: #e74c3c;
        }

        .status-bar {
            font-size: 13px;
            color: #888;
            margin-top: 25px;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 850px) {
            .app {
                flex-direction: column;
                padding: 10px;
            }

            .camera-box {
                width: 100%;
            }

            .panel {
                width: 100%;
                box-sizing: border-box;
                min-width: unset;
            }

            #prediction {
                font-size: 4rem;
                min-height: 100px;
            }
        }
    </style>
</head>

<body>

    <div class="app">
        <div class="camera-box">
            <video class="input_video" playsinline></video>
            <canvas class="output_canvas"></canvas>
        </div>

        <div class="panel">
            <div class="prediction-label">Abjad yang Dikenali:</div>
            <div id="prediction">-</div>

            <div class="controls">
                <button class="btn" id="startBtn">Mulai Kamera</button>
                <button class="btn" id="stopBtn">Berhenti</button>
                <button class="btn" id="exitBtn">Keluar</button>
            </div>

            <div class="status-bar">
                Status: <span id="status" style="font-weight: bold;">Ready</span><br>
                <span id="debug-info" style="font-size: 11px;">Menunggu input kamera...</span>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.querySelector(".input_video");
        const canvasElement = document.querySelector(".output_canvas");
        const canvasCtx = canvasElement.getContext("2d");

        const labelBox = document.getElementById("prediction");
        const statusText = document.getElementById("status");
        const debugText = document.getElementById("debug-info");

        let camera = null;
        let running = false;
        let lastPredictTime = 0;
        const PREDICT_INTERVAL = 200;

        function extractLandmarks(results) {
            let left = new Array(63).fill(0);
            let right = new Array(63).fill(0);

            if (!results.multiHandLandmarks) {
                return [...left, ...right];
            }

            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const hand = results.multiHandLandmarks[i];
                const label = results.multiHandedness[i].label;

                let coords = [];
                hand.forEach(lm => {
                    coords.push(lm.x, lm.y, lm.z);
                });

                if (label === "Left") {
                    left = coords;
                } else {
                    right = coords;
                }
            }
            return [...left, ...right];
        }

        async function predictLandmark(landmarks, handCount) {
            try {
                const res = await fetch("http://127.0.0.1:5000/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        landmarks: landmarks,
                        hand_count: handCount
                    })
                });

                if (!res.ok) throw new Error("Server Lokal Offline");
                return await res.json();

            } catch (err) {
                console.error("API error:", err);
                return { label: "Error", conf: 0 };
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(async (results) => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                let handCount = results.multiHandLandmarks.length;
                statusText.innerText = "Mendeteksi...";

                // Gambar skeleton tangan
                for (const lm of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {
                        color: "#00FFFF",
                        lineWidth: 3
                    });
                    drawLandmarks(canvasCtx, lm, {
                        color: "#FF0000",
                        radius: 2
                    });
                }

                const now = Date.now();
                if (now - lastPredictTime > PREDICT_INTERVAL) {
                    lastPredictTime = now;

                    const landmarks = extractLandmarks(results);
                    const result = await predictLandmark(landmarks, handCount);

                    labelBox.innerText = result.label || "-";
                    debugText.innerText = `Confidence: ${(result.conf * 100).toFixed(1)}% | Hands: ${handCount}`;
                }
            } else {
                labelBox.innerText = "-";
                statusText.innerText = "Tangan tidak terlihat";
                debugText.innerText = "Posisikan tangan di depan kamera";
            }
            canvasCtx.restore();
        });

        // =========================
        // BUTTON CONTROLS
        // =========================
        document.getElementById("startBtn").onclick = () => {
            if (running) return;

            statusText.innerText = "Membuka Kamera...";
            camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });

            camera.start();
            running = true;
            document.getElementById("startBtn").style.opacity = "0.5";
            document.getElementById("status").innerText = "Kamera Aktif";
        };

        document.getElementById("stopBtn").onclick = () => {
            if (camera) {
                camera.stop();
                running = false;
                labelBox.innerText = "-";
                statusText.innerText = "Berhenti";
                document.getElementById("startBtn").style.opacity = "1";
            }
        };

        document.getElementById("exitBtn").onclick = () => {
            if (confirm("Tutup aplikasi?")) {
                window.close();
            }
        };
    </script>

</body>

</html>
